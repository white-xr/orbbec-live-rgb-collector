# ============================================================
# Orbbec RGB-D capture config
# 用途：普通 RGB-D 采集，保存 color + depth_raw + depth_vis，用于点云转换。
#
# 注意：
# - 如果刚刚运行过 Dual RGB，Gemini 305 会停在 "Dual Color Streams" preset。
# - 本配置启动时会先切回 "Default" preset，再打开普通 COLOR + DEPTH。
# ============================================================

output:
  base_dir: "D:/OrbbecLiveCollector/captures"
  color_format: "png"
  depth_raw_format: "png"
  depth_vis_format: "png"
  ir_format: "png"
  save_depth_vis: false
  png_compression: 0
  jpg_quality: 95
  writer_threads: 1
  write_queue_maxsize: 8192

streams:
  color: true
  depth: true
  color_left: false
  color_right: false
  ir_left: false
  ir_right: false
  imu: false

device:
  # RGB-D 模式固定使用 Gemini 335L。
  # 如果更换 335L 设备，请把这里改成新设备序列号。
  serial: "CP2N1630005C"
  index: null

device_preset:
  enabled: true
  name: "Default"
  required: true
  settle_ms: 800

color:
  width: 1280
  height: 800
  fps: 30
  format: "BGR"
  auto_exposure: true
  exposure: 156
  gain: 16
  auto_white_balance: true
  white_balance: 4500

depth:
  width: 1280
  height: 800
  fps: 30
  format: "Y16"
  min_depth_mm: 20
  max_depth_mm: 10000
  colormap: "JET"
  auto_exposure: true
  exposure: 3000
  gain: 16

ir:
  width: 848
  height: 480
  fps: 30
  format: "Y16"
  auto_exposure: true
  exposure: 3000
  gain: 16

preview:
  enabled: true
  window_width: 1400
  window_height: 800
  panel_width: 700
  panel_height: 400
  preview_every_n_frames: 30
  depth_vis_every_n_frames: 30

pointcloud:
  enabled: true
  require_aligned_depth_to_color: false
  depth_unit: "mm"
  preferred_alignment: "none"

pipeline:
  frame_timeout_ms: 200
  frame_aggregate_mode: "FULL_FRAME_REQUIRE"
  align_mode: "DISABLE"
  fallback_to_sdk_default: false

